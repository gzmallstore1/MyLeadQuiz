    let current = 0, score = 0, timer, timeLeft = 10, user = {};

    function start() {
        user.nama = document.getElementById('nama').value;
        user.telp = document.getElementById('telp').value;
        user.alamat = document.getElementById('alamat').value;
        if(!user.nama || !user.telp) return alert("Isi Nama & WA!");
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQ();
    }

    function showQ() {
        if(current >= bankSoal.length) return finish();
        timeLeft = 15;
        const s = bankSoal[current];
        document.getElementById('q-count').innerText = `Soal ${current + 1} / ${bankSoal.length}`;
        document.getElementById('question').innerText = s.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        s.a.forEach((txt, i) => {
            optDiv.innerHTML += `<button class="opt" onclick="hit(${i})">${txt}</button>`;
        });
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-bar').style.width = (timeLeft/15)*100 + "%";
            if(timeLeft <= 0) hit(-1);
        }, 1000);
    }

    function hit(idx) {
        clearInterval(timer);
        if(idx === bankSoal[current].c) score++;
        current++;
        showQ();
    }

    async function finish() {
        document.getElementById('quiz-area').innerHTML = "<h3>Menyimpan Skor...</h3>";
        await fetch('/simpan-skor', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({...user, skor: score})
        });
        location.href = "/"; // Kembali ke depan untuk lihat leaderboard
    }
